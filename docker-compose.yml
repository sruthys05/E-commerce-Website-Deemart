services:
  backend:
    build:
      context: ./backend
    container_name: deemart-backend
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:deemartdb
      - SPRING_DATASOURCE_DRIVERCLASSNAME=org.h2.Driver
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_SHOW_SQL=true
      - SPRING_H2_CONSOLE_ENABLED=true
      - SERVER_PORT=8081
    networks:
      - deemart-network

  frontend:
    build:
      context: ./frontend
    container_name: deemart-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - deemart-network

networks:
  deemart-network:
    driver: bridge